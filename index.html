<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Watch Ads To Unlock Video</title>

  <script src="https://telegram.org/js/telegram-web-app.js"></script>

  <style>
    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
      font-family:Arial, sans-serif;
    }

    body{
      background:#0f172a;
      color:white;
      display:flex;
      justify-content:center;
      align-items:center;
      min-height:100vh;
      padding:20px;
    }

    .container{
      width:100%;
      max-width:400px;
      background:#1e293b;
      border-radius:20px;
      padding:25px;
      text-align:center;
      box-shadow:0 0 20px rgba(0,0,0,0.4);
    }

    h1{
      font-size:24px;
      margin-bottom:10px;
    }

    p{
      color:#cbd5e1;
      margin-bottom:20px;
    }

    .progress-box{
      width:100%;
      height:18px;
      background:#334155;
      border-radius:20px;
      overflow:hidden;
      margin-bottom:20px;
    }

    .progress{
      height:100%;
      width:0%;
      background:#22c55e;
      transition:0.3s;
    }

    button{
      width:100%;
      padding:15px;
      border:none;
      border-radius:12px;
      font-size:18px;
      font-weight:bold;
      cursor:pointer;
      margin-top:10px;
    }

    .ad-btn{
      background:#3b82f6;
      color:white;
    }

    .unlock-btn{
      background:#22c55e;
      color:white;
      display:none;
    }

    .video-box{
      display:none;
      margin-top:20px;
    }

    video{
      width:100%;
      border-radius:15px;
    }

    .counter{
      margin-top:10px;
      font-size:18px;
      color:#facc15;
    }
  </style>
</head>
<body>

<div class="container">

  <h1>Unlock Premium Video</h1>

  <p>Watch 3 ads to unlock the video</p>

  <div class="progress-box">
    <div class="progress" id="progress"></div>
  </div>

  <div class="counter" id="counter">
    Ads Watched: 0 / 3
  </div>

  <button class="ad-btn" onclick="watchAd()">
    Watch Ad
  </button>

  <button class="unlock-btn" id="unlockBtn" onclick="showVideo()">
    Unlock Video
  </button>

  <div class="video-box" id="videoBox">
    <video controls>
      <source src="video.mp4" type="video/mp4">
    </video>
  </div>

</div>

<script>

  let adCount = 0;

  function watchAd(){

    /*
      =========================
      ADSGRAM / MONETAG CODE
      =========================

      এখানে তোমার ad network এর rewarded ad code বসাবে
    */

    // DEMO AD SIMULATION
    alert("Ad Finished Successfully!");

    adCount++;

    updateUI();
  }

  function updateUI(){

    let percent = (adCount / 3) * 100;

    document.getElementById("progress").style.width = percent + "%";

    document.getElementById("counter").innerText =
      `Ads Watched: ${adCount} / 3`;

    if(adCount >= 3){

      document.getElementById("unlockBtn").style.display = "block";

      document.querySelector(".ad-btn").disabled = true;

      document.querySelector(".ad-btn").innerText =
        "All Ads Completed";
    }
  }

  function showVideo(){

    document.getElementById("videoBox").style.display = "block";

    document.getElementById("unlockBtn").style.display = "none";
  }

</script>

</body>
</html>
